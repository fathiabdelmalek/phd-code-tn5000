training:
  epochs: 50
  batch_size: 8
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  weight_decay: 0.001
  momentum: 0.937
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  cos_lr: true
  patience: 20
  gradient_clip: 10.0
  mixed_precision: false

loss:
  box: 10.0
  cls: 1.5
  dfl: 2.0

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0

evaluation:
  conf_thres: 0.25
  iou_thres: 0.45
  max_det: 300
  plots: true

model:
  imgsz: 640
  conf: 0.25
  device: ''
