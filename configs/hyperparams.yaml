# ============================================================
# Easy Hyperparameter Configuration
# ============================================================
# Edit these values to customize training behavior
# Usage: python -m src.train -m yolo26n_ca --hyperparams fast
# ============================================================

# --- Preset: FAST (for quick testing) ---
fast:
  optimizer: SGD
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 1
  cos_lr: false
  patience: 7

# --- Preset: STANDARD (balanced training) ---
standard:
  optimizer: SGD
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  cos_lr: true
  patience: 20

# --- Preset: ADAMW (AdamW optimizer) ---
adamw:
  optimizer: AdamW
  lr0: 0.0001
  lrf: 0.01
  weight_decay: 0.01
  warmup_epochs: 3
  cos_lr: true
  patience: 20

# --- Preset: FINE_TUNE (for transfer learning) ---
fine_tune:
  optimizer: SGD
  lr0: 0.0001
  lrf: 0.001
  momentum: 0.9
  weight_decay: 0.0001
  warmup_epochs: 5
  cos_lr: true
  patience: 30

# --- Preset: Aggressive (for large datasets) ---
aggressive:
  optimizer: SGD
  lr0: 0.02
  lrf: 0.0001
  momentum: 0.95
  weight_decay: 0.0005
  warmup_epochs: 2
  cos_lr: true
  patience: 10
